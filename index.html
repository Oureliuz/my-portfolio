<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pen Name | Art Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Deep Slate */
        }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col items-center justify-center p-6">

    <!-- Main Container -->
    <main class="w-full max-w-2xl text-center space-y-8">
        
        <!-- Header -->
        <header class="space-y-2">
            <h1 class="text-5xl font-light tracking-tighter sm:text-7xl">
                PEN NAME
            </h1>
            <p class="text-slate-400 text-lg font-medium tracking-widest uppercase">
                Digital Artist & Illustrator
            </p>
        </header>

        <!-- Divider -->
        <div class="h-px w-24 bg-slate-700 mx-auto"></div>

        <!-- Social Links -->
        <nav>
            <ul class="flex flex-col sm:flex-row gap-4 justify-center items-center font-medium">
                <li>
                    <a href="https://x.com" target="_blank" 
                       class="px-6 py-2 border border-slate-700 rounded-full hover:bg-slate-800 hover:border-slate-500 transition-all duration-300 block w-40 sm:w-auto">
                        Twitter / X
                    </a>
                </li>
                <li>
                    <a href="https://youtube.com" target="_blank" 
                       class="px-6 py-2 border border-slate-700 rounded-full hover:bg-slate-800 hover:border-slate-500 transition-all duration-300 block w-40 sm:w-auto">
                        YouTube
                    </a>
                </li>
                <li>
                    <a href="https://instagram.com" target="_blank" 
                       class="px-6 py-2 border border-slate-700 rounded-full hover:bg-slate-800 hover:border-slate-500 transition-all duration-300 block w-40 sm:w-auto">
                        Instagram
                    </a>
                </li>
            </ul>
        </nav>

        <!-- Footer Footer -->
        <footer class="pt-12 text-slate-500 text-sm">
            <p>&copy; 2026 Pen Name. All rights reserved.</p>
        </footer>

    </main>

</body>
</html>
